# ClueArk Compose gateway：按 Host 分流到 web / admin-web 容器
# 挂载到 gateway 服务的 /etc/nginx/conf.d/default.conf
# 域名若不是 clueark.com / admin.clueark.com，请修改 server_name

upstream clueark_web {
    server web:80;
    keepalive 8;
}

upstream clueark_admin {
    server admin-web:80;
    keepalive 8;
}

# 未匹配域名或本地 http://<IP> 默认进用户产品
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 32m;

    location / {
        proxy_pass http://clueark_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name clueark.com www.clueark.com;

    client_max_body_size 32m;

    location / {
        proxy_pass http://clueark_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.clueark.com;

    client_max_body_size 32m;

    location / {
        proxy_pass http://clueark_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
